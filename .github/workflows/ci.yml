name: CI
on:
  workflow_dispatch:
    inputs:
      check_versions:
        description: check latest versions
        required: false
        default: true
        type: boolean
jobs:
  check-latest-versions:
    if: github.event.inputs.check_versions == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check latest versions
        run: ./check-latest-versions.sh
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: check-latest-versions
    if: always() && (needs.check-latest-versions.result == 'success' || needs.check-latest-versions.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        platform:
          - 'linux-x64'
        include:
          - os: macos-15
            platform: 'osx-arm64'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pipx install meson
          brew install automake nasm
      - name: Build ${{ matrix.platform }}
        run: ./build.sh ${{ matrix.platform }}
      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: libvips-*-${{ matrix.platform }}.tar.gz
          compression-level: 0
          retention-days: 1
          if-no-files-found: error